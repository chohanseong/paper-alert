name: Daily Paper Alert

on:
  schedule:
    # 매일 00:00 UTC = 오전 9시 KST (UTC+9)
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼도 사용 가능

jobs:
  send-paper-alert:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 논문 검색 및 이메일 발송
        env:
          MAIL_SENDER: ${{ secrets.MAIL_SENDER }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: python paper_alert.py

      - name: 발송 기록(sent_dois.json) 커밋
        run: |
          git config user.name "paper-alert-bot"
          git config user.email "actions@github.com"
          git add sent_dois.json
          git diff --staged --quiet || git commit -m "update sent DOIs"
          git push
